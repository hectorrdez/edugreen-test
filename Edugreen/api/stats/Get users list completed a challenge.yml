info:
  name: Get users list completed a challenge
  type: http
  seq: 2

http:
  method: GET
  url: "{{API_URL}}/stats/challenge/1"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test(`Response with expected status 200`, () => {
          expect(res.getStatus()).to.be.equal(200);
        });

        test(`Response with expected data`, () => {
          expect(res.getBody()).to.have.property("data");
          expect(res.getBody().data).not.to.be.equals({});
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
