info:
  name: Change password by token
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{API_DOMAIN}}:{{API_PORT}}/api/auth/{{USER_PASSWORD_TOKEN}}"
  body:
    type: json
    data: |-
      {
        "password": "test_student2"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test(`Response with expected status`, () => {
          expect(res.getStatus()).to.be.equal(200);
        });

        test(`Successfully changed password`, ()=>{
          expect(res.get)
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
