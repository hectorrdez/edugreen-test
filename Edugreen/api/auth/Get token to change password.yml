info:
  name: Get token to change password
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{API_URL}}/auth"
  body:
    type: json
    data: |-
      {
        "email": "test.student@student.edugreen.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test(`Response with expected status`, () => {
          expect(res.getStatus()).to.be.equal(200);
        });

        test(`Response with token`, () => {
          const token = res.getBody().data.passwordToken;
          expect(res.getBody().data).to.have.property("passwordToken");
          bru.setEnvVar("USER_PASSWORD_TOKEN", token);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
