info:
  name: Delete a teacher user
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{API_DOMAIN}}:{{API_PORT}}/api/user/{{TEACHER_USER_ID}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test(`Response with expected status`, () => {
          expect(res.getStatus()).to.be.equal(200);
        });

        test(`Deleted successfully`, () => {
          expect(res.getBody().data.message).to.be.equal("User deleted successfully");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
