info:
  name: Get all users of a class
  type: http
  seq: 4

http:
  method: GET
  url: "{{API_DOMAIN}}:{{API_PORT}}/api/user-class/class/{{CLASS_ID}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test(`Response with expected status`, () => {
          expect(res.getStatus()).to.be.equal(200);
        });

        test(`Successfully enrolled user`, () => {
          expect(res.getBody().error).to.be.equal("");
          expect(res.getBody()).have.property("data");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
