info:
  name: Get classes of a user
  type: http
  seq: 3

http:
  method: GET
  url: "{{API_DOMAIN}}:{{API_PORT}}/api/user-class/user/2"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test(`Response with expected status`, () => {
          expect(res.getStatus()).to.be.equal(200);
        });

        test(`Successfully get info`, () => {
          expect(res.getBody().error).to.be.equal("");
          expect(res.getBody()).have.property("data");
          expect(res.getBody().data).not.to.be.equals([]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
